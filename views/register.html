<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwapPay | Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 80px);
            padding: 2rem;
        }

        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem 2rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .auth-card h2 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .auth-card h2 span {
            color: var(--accent-secondary);
        }

        .auth-card p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.3s, background 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-secondary);
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--accent-primary), #8e7dfa);
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3);
            transition: transform 0.3s, box-shadow 0.3s;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(108, 92, 231, 0.4);
        }

        .auth-links {
            margin-top: 2rem;
            color: var(--text-secondary);
        }

        .auth-links a {
            color: var(--accent-secondary);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <nav class="navbar">
        <div class="logo"><a href="/" style="text-decoration: none; color: inherit;">Swap<span>Pay</span></a></div>
        <ul class="nav-links">
            <li><a href="/login" class="btn-login">Login</a></li>
        </ul>
    </nav>

    <main class="auth-container">
        <div class="auth-card">
            <h2>Join <span>SwapPay</span></h2>
            <p>Create an account to start swapping safely on campus.</p>

            <form action="/api/auth/register" method="POST" id="registerForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" class="form-control" placeholder="e.g. Alex M." required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" class="form-control" placeholder="e.g. 9876543210"
                        required>
                </div>
                <div class="form-group">
                    <label for="email">College Email</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="e.g. alex@college.edu"
                        required>
                </div>
                <div class="form-group">
                    <label for="college">College Name</label>
                    <input type="text" id="college" name="college" class="form-control"
                        placeholder="e.g. Engineering Institute" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control"
                        placeholder="Create a strong password" required>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-control"
                        placeholder="Repeat your password" required>
                </div>
                <button type="submit" class="btn-submit">Create Account</button>
            </form>
            <div class="auth-links">
                Already have an account? <a href="/login">Log In</a>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function (e) {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                e.preventDefault();
                alert('Passwords do not match. Please try again.');
            }
        });
    </script>
</body>

</html>
